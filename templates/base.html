<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}StockOps{% endblock %} - 주식매수선택권 관리</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <div class="layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <div class="logo-icon">S</div>
        <div>
          <div class="logo-title">StockOps</div>
          <div class="logo-sub">주식매수선택권 관리</div>
        </div>
      </div>

      <nav class="sidebar-nav">
        <a href="/" class="nav-item {% if request.path == '/' %}active{% endif %}">
          <span class="nav-icon">&#9632;</span>
          대시보드
        </a>
        <a href="/round/new" class="nav-item {% if request.path == '/round/new' %}active{% endif %}">
          <span class="nav-icon">&#43;</span>
          새 회차 만들기
        </a>
      </nav>

      {% if round is defined and round %}
      <div class="sidebar-section">
        <div class="sidebar-section-title">현재 회차</div>
        <div class="sidebar-round-name">{{ round.name }}</div>
        {% if round.exercise_date %}
        <div class="sidebar-round-date">행사일: {{ round.exercise_date }}</div>
        {% endif %}
      </div>
      {% endif %}

      <div class="sidebar-footer">
        <div class="sidebar-footer-text">StockOps v1.0</div>
      </div>
    </aside>

    <!-- Main content -->
    <main class="main-content">
      {% block content %}{% endblock %}
    </main>
  </div>

  <div id="modal-overlay" class="modal-overlay" style="display:none;">
    <div id="modal-box" class="modal-box">
      <div class="modal-header">
        <h3 id="modal-title"></h3>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <div id="modal-body" class="modal-body"></div>
    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>

  <script src="/static/js/app.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
